# Harness Quality Gate — CI workflow template
# Auto-generated by harness-init.sh or init-project; or copy manually to your project's .github/workflows/
#
# Set repo variable CURRENT_PHASE (Settings → Variables → Actions) to match your phase.
# Defaults to phase 3 if the variable is not set.
name: Harness Quality Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  gate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness dependencies
        run: |
          pip install pyyaml
          pip install -r harness/requirements.txt || true

      - name: Run Quality Gate (current phase)
        env:
          PHASE: ${{ vars.CURRENT_PHASE || '3' }}
        run: |
          python harness/harness_cli.py run-phase --phase $PHASE --project .

      - name: FR Traceability Check
        run: python harness/scripts/check_fr_full.py --fr all
        continue-on-error: true
