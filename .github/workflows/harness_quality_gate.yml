# Harness Quality Gate — CI workflow template
# Auto-generated by harness-init.sh or init-project; or copy manually to .github/workflows/
# Kept in sync with INTEGRATION.md §4 Option A.
#
# IMPORTANT: Configure branch protection rules in GitHub repo settings:
#   Settings → Branches → Add rule → Branch: main
#   ✅ Require a pull request before merging
#   ✅ Require status checks to pass before merging → Required check: "gate-check"
#   ✅ Do not allow bypassing the above settings  (no admin bypass)
#   ✅ Block force pushes
#
# No CURRENT_PHASE variable needed — phase is auto-detected from .methodology/state.json.
name: Harness Quality Gate

on:
  push:
    branches: ['**']        # All branch pushes — catches worktree branches before merge
  pull_request:
    branches: [main]

jobs:
  gate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness dependencies
        run: |
          # pyyaml required for gate score variance check
          pip install -r harness/requirements.txt || true
          pip install pyyaml 2>/dev/null || true

      - name: Auto-detect phase from state.json
        id: phase
        run: |
          # Read phase from project's own state.json — not a GitHub variable.
          # Eliminates drift between CI phase and local quality.phase config.
          PHASE=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('.methodology/state.json'))
              print(d.get('current_phase', d.get('phase', 1)))
          except Exception:
              print(1)
          " 2>/dev/null || echo "1")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT
          echo "Detected phase: $PHASE (from .methodology/state.json)"

      - name: Run Phase Preflight (FSM / drift / constitution)
        # Structural enforcement only (FSM state, constitution, drift, traceability).
        # Gate score evaluation requires an interactive Claude session — always local.
        # Gate 4 (P6 exit) also requires human Hermes APPROVE — run locally, not in CI.
        if: steps.phase.outputs.PHASE != '6'
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: python harness/harness_cli.py run-phase --phase $PHASE --project .

      - name: Gate Score Variance Check
        # Detects fabricated gate scores: if all FRs in the phase have identical
        # composite scores, they were likely copied rather than evaluated per FR.
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: |
          python3 - <<'EOF'
          import glob, sys, os
          try:
              import yaml
          except ImportError:
              print("pyyaml not available — skipping variance check")
              sys.exit(0)
          phase = int(os.environ.get("PHASE", "1"))
          logs = glob.glob(f".methodology/decision_logs/**/GATE_{phase}_*.yaml", recursive=True)
          scores = []
          for lf in logs:
              try:
                  d = yaml.safe_load(open(lf))
                  s = (d or {}).get("scores", {}).get("gate_score")
                  if s is not None:
                      scores.append(float(s))
              except Exception:
                  pass
          if len(scores) > 2 and len(set(scores)) == 1:
              print(f"FAIL: All {len(scores)} gate scores identical ({scores[0]}) for phase {phase}.")
              print("      Scores must vary per FR — identical scores indicate fabrication.")
              sys.exit(1)
          print(f"OK: Gate score variance check passed ({len(scores)} entries for phase {phase}).")
          EOF

      - name: FR Traceability Check
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: python harness/scripts/check_fr_full.py --phase $PHASE
        continue-on-error: true
