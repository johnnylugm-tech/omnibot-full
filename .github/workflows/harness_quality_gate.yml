# Harness Quality Gate — CI workflow template
# Auto-generated by harness-init.sh or init-project; or copy manually to .github/workflows/
# Kept in sync with INTEGRATION.md §4 Option A.
#
# Push directly to main — no PR required.
# Blocking is via local pre-push hook (harness/scripts/harness-init.sh) + this CI gate.
# If CI fails after push, fix and push again; CI re-evaluates on the next push.
#
# No CURRENT_PHASE variable needed — phase is auto-detected from .methodology/state.json.
name: Harness Quality Gate

on:
  push:
    branches: [main]

jobs:
  gate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0  # Full history required for phase boundary commit verification

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness dependencies
        run: |
          # pyyaml required for gate score variance check
          pip install -r harness/requirements.txt || true
          pip install pyyaml 2>/dev/null || true

      - name: Auto-detect phase from state.json
        id: phase
        run: |
          # Read phase from project's own state.json — the single source of truth.
          # Local hooks, CLI commands, and CI all read .methodology/state.json::current_phase.
          PHASE=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('.methodology/state.json'))
              print(d.get('current_phase', d.get('phase', 1)))
          except Exception:
              print(1)
          " 2>/dev/null || echo "1")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT
          echo "Detected phase: $PHASE (from .methodology/state.json)"

      - name: Run Phase Preflight (FSM / drift / constitution)
        # Structural enforcement only (FSM state, constitution, drift, traceability).
        # Gate score evaluation requires an interactive Claude session — always local.
        # Gate 4 (P6 exit) also requires human Hermes APPROVE — run locally, not in CI.
        if: steps.phase.outputs.PHASE != '6'
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: python harness/harness_cli.py run-phase --phase $PHASE --project .

      - name: Gate Score Variance Check
        # Detects fabricated gate scores: if all per-FR Gate1 scores in the phase are
        # identical, they were likely copied rather than evaluated per FR.
        # Only checks entries where fr_id is non-null (per-FR scores); aggregate Gate2/Gate4
        # scores (fr_id=null) are excluded so one different aggregate score can't mask fraud.
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: |
          python3 - <<'EOF'
          import glob, sys, os
          try:
              import yaml
          except ImportError:
              print("pyyaml not available — skipping variance check")
              sys.exit(0)
          phase = int(os.environ.get("PHASE", "1"))
          logs = glob.glob(f".methodology/decision_logs/**/GATE_{phase}_*.yaml", recursive=True)
          scores = []
          for lf in logs:
              try:
                  d = yaml.safe_load(open(lf))
                  if (d or {}).get("ctx", {}).get("fr_id") is None:
                      continue  # skip aggregate (Gate2/Gate4) entries
                  s = (d or {}).get("scores", {}).get("gate_score")
                  if s is not None:
                      scores.append(float(s))
              except Exception:
                  pass
          if len(scores) > 2 and len(set(scores)) == 1:
              print(f"FAIL: All {len(scores)} per-FR gate scores identical ({scores[0]}) for phase {phase}.")
              print("      Scores must vary per FR — identical scores indicate fabrication.")
              sys.exit(1)
          print(f"OK: Gate score variance check passed ({len(scores)} per-FR entries for phase {phase}).")
          EOF

      - name: FR Traceability Check
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: python harness/scripts/check_fr_full.py --phase $PHASE
        continue-on-error: true

  push-milestone-enforcement:
    name: Enforce push-milestone (no --no-verify bypass)
    runs-on: ubuntu-latest
    # Only enforce on pushes to main — PRs may legitimately lack state.json
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check last_milestone_command in state.json
        run: |
          STATE_FILE=".methodology/state.json"
          if [ ! -f "$STATE_FILE" ]; then
            echo "INFO: No state.json found — project not yet initialized, skipping."
            exit 0
          fi
          PHASE=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('current_phase', 0))")
          if [ "$PHASE" -lt 3 ]; then
            echo "INFO: Phase $PHASE < 3 — push-milestone not yet required."
            exit 0
          fi
          CMD=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('last_milestone_command', ''))")
          if [ -z "$CMD" ]; then
            echo "ERROR: state.json has no last_milestone_command field."
            echo "Direct git push detected. Use instead:"
            echo "  python harness/harness_cli.py push-milestone --type <type> --project ."
            exit 1
          fi
          echo "OK: last_milestone_command = $CMD"

  p1p2-enforcement:
    name: P1/P2 Push-Checkpoint Enforcement
    runs-on: ubuntu-latest
    # --no-verify skips local hooks but not CI. This job is the server-side gate.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness dependencies
        run: pip install -r harness/requirements.txt || true

      - name: Detect phase
        id: phase
        run: |
          PHASE=$(python3 -c "
          import json
          try:
              d = json.load(open('.methodology/state.json'))
              print(int(d.get('current_phase', 0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT
          echo "Detected phase: $PHASE"

      - name: Verify push-checkpoint sentinel (P1/P2)
        # push-checkpoint writes last_push_checkpoint to state.json.
        # Absent = agent used raw git push --no-verify, bypassing all gates.
        if: steps.phase.outputs.PHASE == '1' || steps.phase.outputs.PHASE == '2'
        run: |
          SENTINEL=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('.methodology/state.json'))
              print(d.get('last_push_checkpoint', ''))
          except Exception:
              print('')
          " 2>/dev/null || echo "")
          if [ -z "$SENTINEL" ]; then
            echo "ERROR: state.json has no last_push_checkpoint field."
            echo "Direct git push detected — push-checkpoint was never called."
            echo "Use: python harness/harness_cli.py push-checkpoint --phase ${{ steps.phase.outputs.PHASE }} --project ."
            echo "Do NOT bypass with: git push --no-verify"
            exit 1
          fi
          echo "OK: last_push_checkpoint = $SENTINEL"

      - name: Verify HANDOVER.md exists (P1/P2)
        if: steps.phase.outputs.PHASE == '1' || steps.phase.outputs.PHASE == '2'
        run: |
          if [ ! -f "HANDOVER.md" ]; then
            echo "ERROR: HANDOVER.md missing."
            echo "push-checkpoint generates HANDOVER.md. Missing = checkpoint was bypassed."
            exit 1
          fi
          echo "OK: HANDOVER.md present."

      - name: Verify Agent B approvals exist (P1/P2)
        if: steps.phase.outputs.PHASE == '1' || steps.phase.outputs.PHASE == '2'
        run: |
          APPROVALS=$(find .methodology/agent_b_approvals -name "*.json" 2>/dev/null | wc -l || echo 0)
          if [ "$APPROVALS" -eq 0 ]; then
            echo "ERROR: No Agent B approval files in .methodology/agent_b_approvals/"
            echo "Run: python harness/harness_cli.py dispatch --role reviewer --fr-id <FR-ID> --phase ${{ steps.phase.outputs.PHASE }} --project ."
            exit 1
          fi
          APPROVED=$(python3 -c "
          import json, glob, sys
          files = glob.glob('.methodology/agent_b_approvals/*.json')
          n = sum(1 for f in files if json.load(open(f)).get('review_status') == 'APPROVE')
          print(n)
          " 2>/dev/null || echo 0)
          if [ "$APPROVED" -eq 0 ]; then
            echo "ERROR: No Agent B approval file has review_status=APPROVE."
            exit 1
          fi
          echo "OK: $APPROVED Agent B APPROVE file(s) found."

  checklist-check:
    name: Phase Plan Checklist Verification
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness dependencies
        run: pip install -r harness/requirements.txt || true

      - name: Detect phase
        id: phase
        run: |
          PHASE=$(python3 -c "
          import json
          try:
              d = json.load(open('.methodology/state.json'))
              print(int(d.get('current_phase', 0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT

      - name: Check mandatory checklist items in phase plan
        run: |
          PLAN=".methodology/phase${{ steps.phase.outputs.PHASE }}_plan.md"
          if [ ! -f "$PLAN" ]; then
            echo "INFO: $PLAN not found — skipping checklist check."
            exit 0
          fi
          python harness/harness_cli.py check-checklist \
            --phase ${{ steps.phase.outputs.PHASE }} \
            --project . || {
              echo ""
              echo "Mandatory plan items are unchecked in $PLAN."
              echo "Change '- [ ]' to '- [x]' for each completed step."
              exit 1
            }

  agent-b-approval-check:
    name: Agent B Approval Verification
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness dependencies
        run: pip install -r harness/requirements.txt || true

      - name: Detect phase
        id: phase
        run: |
          PHASE=$(python3 -c "
          import json
          try:
              d = json.load(open('.methodology/state.json'))
              print(int(d.get('current_phase', 0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT

      - name: Verify Agent B approvals (P3+)
        # P1/P2 approval check is handled by p1p2-enforcement job.
        if: steps.phase.outputs.PHASE >= 3
        run: |
          python harness/harness_cli.py verify-agent-b-approvals \
            --phase ${{ steps.phase.outputs.PHASE }} \
            --project . || {
              echo ""
              echo "Agent B review files missing or non-APPROVE."
              echo "Each FR needs .methodology/agent_b_approvals/FR-XX.json"
              echo "with review_status=APPROVE and docs_embedded=[SRS.md, SAD.md]"
              exit 1
            }

  p8-archive-check:
    name: P8 Archive & HANDOVER Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Detect if P8 milestone was pushed
        id: p8
        run: |
          STATE_FILE=".methodology/state.json"
          IS_P8="false"
          if [ -f "$STATE_FILE" ]; then
            CMD=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('last_milestone_command',''))")
            if echo "$CMD" | grep -q "p8"; then
              IS_P8="true"
            fi
          fi
          echo "IS_P8=$IS_P8" >> $GITHUB_OUTPUT

      - name: Validate .methodology-archive exists (P8 only)
        if: steps.p8.outputs.IS_P8 == 'true'
        run: |
          if [ ! -d ".methodology-archive" ]; then
            echo "ERROR: .methodology-archive/ does not exist."
            echo "Archive all phase artifacts before P8 push."
            exit 1
          fi
          echo "OK: .methodology-archive/ exists."

      - name: Validate HANDOVER.md has no Phase 9 references (P8 only)
        if: steps.p8.outputs.IS_P8 == 'true'
        run: |
          if [ -f "HANDOVER.md" ]; then
            if grep -qi "phase 9\|phase9\|phase9_plan" HANDOVER.md; then
              echo "ERROR: HANDOVER.md references non-existent Phase 9."
              grep -ni "phase 9\|phase9" HANDOVER.md || true
              exit 1
            fi
            echo "OK: HANDOVER.md has no Phase 9 references."
          fi
